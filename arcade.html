<m-group>

  <!-- Cabinet Body -->
  <m-cube width="1.2" height="2.2" depth="0.8" y="1.1" color="#1a1a2e"></m-cube>

  <!-- Screen Bezel -->
  <m-cube width="1.0" height="0.85" depth="0.05" y="1.75" z="0.43" color="#0f0f0f"></m-cube>

  <!-- Game Screen Preview Image -->
  <m-image id="screen" src="https://jdunk4.github.io/ARCADE1/SMW%20-%20Kaizo%20Mario%20World%201.png" width="0.88" height="0.72" y="1.75" z="0.46">
  </m-image>

  <!-- Marquee Box -->
  <m-cube width="1.1" height="0.35" depth="0.3" y="2.4" z="0.25" color="#e8000d"></m-cube>

  <!-- Marquee Title -->
  <m-label content="KAIZO MARIO WORLD" y="2.47" z="0.42" width="1.0" height="0.16" font-size="20" color="#ffffff" alignment="center">
  </m-label>

  <!-- Marquee Subtitle -->
  <m-label content="T. Takemoto  |  Expert  |  4.5★" y="2.3" z="0.42" width="1.0" height="0.1" font-size="12" color="#ffcc00" alignment="center">
  </m-label>

  <!-- Marquee Light Strip Top -->
  <m-cube width="1.15" height="0.03" depth="0.1" y="2.62" z="0.3" color="#ffcc00"></m-cube>

  <!-- Marquee Light Strip Bottom -->
  <m-cube width="1.15" height="0.03" depth="0.1" y="2.22" z="0.3" color="#ffcc00"></m-cube>

  <!-- Side Panel Left -->
  <m-cube width="0.05" height="2.2" depth="0.8" y="1.1" x="-0.625" color="#111133"></m-cube>

  <!-- Side Panel Right -->
  <m-cube width="0.05" height="2.2" depth="0.8" y="1.1" x="0.625" color="#111133"></m-cube>

  <!-- Control Panel -->
  <m-cube width="1.1" height="0.15" depth="0.5" y="0.95" z="0.15" rx="-20" color="#111122"></m-cube>

  <!-- Joystick Base -->
  <m-cylinder radius="0.05" height="0.02" y="1.06" z="0.1" x="-0.2" color="#222233"></m-cylinder>

  <!-- Joystick Ball -->
  <m-sphere radius="0.06" y="1.1" z="0.1" x="-0.2" color="#cc0000"></m-sphere>

  <!-- Buttons -->
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.1" color="#e8000d"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.22" color="#ffcc00"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.34" color="#0044ff"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="-0.05" x="0.22" color="#00aa44"></m-sphere>

  <!-- Coin Slot -->
  <m-cube width="0.1" height="0.02" depth="0.02" y="1.45" z="0.42" color="#333344"></m-cube>

  <!-- Speaker Grille Left -->
  <m-cube width="0.15" height="0.25" depth="0.02" y="1.3" z="0.42" x="-0.3" color="#150000"></m-cube>

  <!-- Speaker Grille Right -->
  <m-cube width="0.15" height="0.25" depth="0.02" y="1.3" z="0.42" x="0.3" color="#150000"></m-cube>

  <!-- Floor Base -->
  <m-cube width="1.3" height="0.08" depth="0.9" y="0.04" color="#1a0505"></m-cube>

  <!-- Difficulty Label -->
  <m-label content="EXPERT" y="0.65" z="0.42" width="0.9" height="0.2" font-size="8" color="#ff4400" alignment="center"></m-label>

  <!-- Completion Counter -->
  <m-label id="completion-label" content="0 players completed" y="0.52" z="0.42" width="0.9" height="0.1" font-size="10" color="#aaaaff" alignment="center"></m-label>

  <!-- Info Card — positioned to the right at screen level -->
  <m-image id="info-card" src="https://jdunk4.github.io/ARCADE1/KMW1%20-%20Info%20Card.png" width="1.4" height="1.0" x="1.4" y="1.5" z="0.46" ry="-15" visible="false">
  </m-image>

  <!-- Position Probe -->
  <m-position-probe range="4.0" id="probe"></m-position-probe>

  <!-- m-link wraps the interaction — MML-native navigation, not blocked by sandbox -->
  <m-link id="game-link" href="https://jdunk4.github.io/ARCADE1/game.html" target="_blank">
    <m-interaction id="play-btn" prompt="Press E to Play Kaizo Mario World" range="4.0" y="1.1">
    </m-interaction>
  </m-link>

  <script>
    // ── Config ──────────────────────────────────────────────────────────
    const BACKEND_SERVER = "https://gamer-production.up.railway.app";
    const ROM_ID = "kaizo-mario-world-1";
    const GAME_URL = "https://jdunk4.github.io/ARCADE1/game.html";

    const params = new URLSearchParams(
      typeof window !== "undefined" ? window.location.search : ""
    );
    const WALLET = params.get("wallet") || "anonymous";

    // ── Elements ────────────────────────────────────────────────────────
    const probe = document.getElementById("probe");
    const card = document.getElementById("info-card");
    const compLabel = document.getElementById("completion-label");
    const gameLink = document.getElementById("game-link");

    // ── Inject wallet + rom into link href ───────────────────────────────
    gameLink.setAttribute("href", GAME_URL + "?rom=" + ROM_ID + "&wallet=" + WALLET);

    // ── Proximity ───────────────────────────────────────────────────────
    probe.addEventListener("positionenter", function() {
      card.setAttribute("visible", "true");
    });
    probe.addEventListener("positionleave", function() {
      card.setAttribute("visible", "false");
    });

    // ── Completion Count ─────────────────────────────────────────────────
    function refreshCompletionCount() {
      fetch(BACKEND_SERVER + "/completions/" + ROM_ID)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var count = data.count || 0;
          compLabel.setAttribute("content",
            count + " player" + (count !== 1 ? "s" : "") + " completed"
          );
        }).catch(function() {});
    }

    refreshCompletionCount();
  </script>

</m-group>
