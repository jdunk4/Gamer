<m-group>

  <!-- Cabinet Body -->
  <m-cube
    width="1.2" height="2.2" depth="0.8"
    y="1.1" color="#1a1a2e">
  </m-cube>

  <!-- Screen Bezel -->
  <m-cube
    width="1.0" height="0.85" depth="0.05"
    y="1.75" z="0.43"
    color="#0f0f0f">
  </m-cube>

  <!-- Screen Image -->
  <m-image
    src="https://jdunk4.github.io/Gamer/preview.png"
    width="0.88"
    height="0.72"
    y="1.75" z="0.46">
  </m-image>

  <!-- Marquee -->
  <m-cube
    width="1.1" height="0.25" depth="0.3"
    y="2.4" z="0.25" color="#e8000d">
  </m-cube>

  <!-- Marquee Label -->
  <m-label
    content="ARCADE"
    y="2.4" z="0.42"
    width="1.0" height="0.2"
    font-size="48" color="#ffffff"
    alignment="center">
  </m-label>

  <!-- Control Panel -->
  <m-cube
    width="1.1" height="0.15" depth="0.5"
    y="0.95" z="0.15" rx="-20"
    color="#111122">
  </m-cube>

  <!-- Joystick -->
  <m-sphere
    radius="0.06"
    y="1.07" z="0.1" x="-0.2"
    color="#cc0000">
  </m-sphere>

  <!-- Buttons -->
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.15" color="#e8000d"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.28" color="#ffcc00"></m-sphere>

  <!-- Interaction + Link to game -->
  <m-interaction
    prompt="Press E to Play"
    range="2.5">
  </m-interaction>

  <m-link
    href="https://jdunk4.github.io/Gamer/game.html"
    target="_blank">
    <m-cube
      width="0.88" height="0.72" depth="0.01"
      y="1.75" z="0.47"
      color="#111111">
    </m-cube>
  </m-link>

  <script>
    const interaction = document.querySelector("m-interaction");
    const link = document.querySelector("m-link");
    interaction.addEventListener("interact", () => {
      link.setAttribute("href", "https://jdunk4.github.io/Gamer/game.html");
    });
  </script>

</m-group>
