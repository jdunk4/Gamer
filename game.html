<DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kaizo Mario World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
}
#game-container { width: 100%; height: 100%; }

/* Save/status indicator */
#status {
position: fixed;
top: 8px;
right: 10px;
font-family: monospace;
font-size: 11px;
color: #ffcc00;
background: rgba(0,0,0,0.7);
padding: 3px 8px;
border-radius: 4px;
z-index: 999;
display: none;
}
</style>
</head>
<body>
<div id="status"></div>
<div id="game-container">
<div id="game"></div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const ROM_ID = "kaizo-mario-world-1";
const SERVER = "https://gamer-production.up.railway.app";
const ROM_TOKEN = "kaizo-arcade-2024-secret";

// Wallet comes from the MML world via URL param: game.html?wallet=0xABC
const params = new URLSearchParams(window.location.search);
const WALLET = params.get("wallet") || "anonymous";

// ── EmulatorJS Config ───────────────────────────────────────────────────
EJS_player = "#game";
EJS_core = "snes";
EJS_gameUrl = `${SERVER}/rom/Kaizo%20Mario%20(English).sfc?token=${ROM_TOKEN}`;
EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
EJS_startOnLoaded = true;
EJS_color = "#e8000d";

// ── Status helper ────────────────────────────────────────────────────────
function showStatus(msg, duration = 2500) {
const el = document.getElementById("status");
el.textContent = msg;
el.style.display = "block";
clearTimeout(el._timer);
el._timer = setTimeout(() => { el.style.display = "none"; }, duration);
}

// ── Save State: load on start ─────────────────────────────────────────────
// EmulatorJS exposes EJS_emulator after boot — we hook in once it's ready
function waitForEmulator(callback, attempts = 0) {
if (typeof EJS_emulator !== "undefined" && EJS_emulator.gameManager) {
callback(EJS_emulator);
} else if (attempts < 60) {
setTimeout(() => waitForEmulator(callback, attempts + 1), 500);
}
}

async function loadSaveState(emulator) {
if (WALLET === "anonymous") return;
try {
const res = await fetch(`${SERVER}/save?wallet=${WALLET}&rom=${ROM_ID}`);
const data = await res.json();
if (data.state) {
// Convert base64 back to Uint8Array and load into emulator
const binary = atob(data.state);
const bytes = new Uint8Array(binary.length);
for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
emulator.gameManager.loadState(bytes);
showStatus("💾 Save loaded");
}
} catch (e) {
console.warn("Could not load save state:", e);
}
}

async function writeSaveState(emulator) {
if (WALLET === "anonymous") return;
try {
const stateBytes = emulator.gameManager.saveState();
// Convert to base64 for JSON transport
const base64 = btoa(String.fromCharCode(...stateBytes));
await fetch(`${SERVER}/save`, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ wallet: WALLET, rom: ROM_ID, state: base64 })
});
showStatus("💾 Saved");
} catch (e) {
console.warn("Could not write save state:", e);
}
}

// ── Completion detection ──────────────────────────────────────────────────
// EmulatorJS doesn't natively detect credits — we use a memory watch.
// For Kaizo Mario World (SMW base): credits trigger when SNES RAM
// address 0x1F28 (end sequence flag) is set to 1.
// This is a best-effort hook — adjust address per ROM hack as needed.
async function logCompletion() {
try {
await fetch(`${SERVER}/complete`, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ wallet: WALLET, rom: ROM_ID })
});
showStatus("🏆 Completion recorded!", 5000);
} catch (e) {}
}

function startMemoryWatch(emulator) {
let completed = false;
setInterval(() => {
if (completed) return;
try {
// Read SNES end-sequence flag — adjust per ROM
const val = emulator.gameManager.getMemory(0x1F28);
if (val === 1) {
completed = true;
logCompletion();
}
} catch (e) {}
}, 3000); // check every 3 seconds
}

// ── Auto-save every 60 seconds ────────────────────────────────────────────
function startAutoSave(emulator) {
setInterval(() => writeSaveState(emulator), 60000);
}

// ── Boot sequence ─────────────────────────────────────────────────────────
window.addEventListener("load", () => {
waitForEmulator((emulator) => {
loadSaveState(emulator);
startAutoSave(emulator);
startMemoryWatch(emulator);
});
});

// Save on page unload (player closes tab or walks away)
window.addEventListener("beforeunload", () => {
if (typeof EJS_emulator !== "undefined" && EJS_emulator.gameManager) {
writeSaveState(EJS_emulator);
}
});
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
