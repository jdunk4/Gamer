<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rainbow Realms 1.3 - Info Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .card {
    width: 280px;
    background: #0d1b2a;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .header {
    background: #2ecc40;
    padding: 12px 14px 10px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,0,0,0.22);
    border-radius: 4px;
    padding: 3px 8px 3px 6px;
    margin-bottom: 6px;
  }

  .badge-text {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
  }

  .badge-icons { font-size: 14px; line-height: 1; }

  .title {
    font-size: 28px;
    font-weight: 800;
    font-style: italic;
    color: #fff;
    line-height: 1.05;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.35);
  }

  .subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.72);
    margin-top: 3px;
    font-weight: 600;
  }

  .diff-section {
    background: #0d1b2a;
    padding: 12px 14px 10px;
    border-bottom: 1px solid #16293d;
  }

  .diff-label {
    font-size: 8px;
    color: #3d5a70;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 9px;
  }

  .bar-wrap {
    position: relative;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg,
      #27ae60 0%,
      #a8d800 20%,
      #f1c40f 40%,
      #e67e22 60%,
      #7d3c00 80%,
      #8e44ad 100%
    );
  }

  /* Intermediate = ~16.7% */
  .bar-dot {
    position: absolute;
    top: 50%;
    left: 16.7%;
    transform: translate(-50%, -50%);
    width: 15px;
    height: 15px;
    background: #fff;
    border-radius: 50%;
    border: 3px solid #c8e800;
    box-shadow: 0 0 8px rgba(200,232,0,0.7);
    z-index: 2;
  }

  .diff-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
  }

  .diff-ticks span {
    font-size: 7.5px;
    color: #3d5a70;
    text-transform: capitalize;
    flex: 1;
    text-align: center;
  }

  .diff-ticks span:first-child { text-align: left; }
  .diff-ticks span:last-child { text-align: right; }

  .diff-ticks span.active {
    color: #2ecc40;
    font-weight: 800;
    font-size: 9px;
  }

  .stats { padding: 2px 0; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid #16293d;
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-key {
    font-size: 9px;
    color: #3d5a70;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .stat-val {
    font-size: 13px;
    color: #fff;
    font-weight: 700;
  }

  .launch-btn {
    background: #ff8c00;
    color: #fff;
    text-align: center;
    padding: 13px;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    border-top: 2px solid #cc7000;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="badge">
      <span class="badge-text">Intermediate</span>
      <span class="badge-icons">🍄⭐</span>
    </div>
    <div class="title">THE RAINBOW REALMS</div>
    <div class="subtitle">Super Mario Bros 3 ROM Hack — v1.3</div>
  </div>

  <div class="diff-section">
    <div class="diff-label">Difficulty Scale</div>
    <div class="bar-wrap">
      <div class="bar-dot"></div>
    </div>
    <div class="diff-ticks">
      <span>Casual</span>
      <span class="active">Inter.</span>
      <span>Advanced</span>
      <span>Expert</span>
      <span>Master</span>
      <span>Grandmaster</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat-row"><span class="stat-key">Author</span><span class="stat-val">Bluecrush</span></div>
    <div class="stat-row"><span class="stat-key">Difficulty</span><span class="stat-val">Intermediate</span></div>
    <div class="stat-row"><span class="stat-key">Type</span><span class="stat-val">Adventure</span></div>
    <div class="stat-row"><span class="stat-key">Base Game</span><span class="stat-val">Super Mario Bros 3</span></div>
    <div class="stat-row"><span class="stat-key">Platform</span><span class="stat-val">NES</span></div>
    <div class="stat-row"><span class="stat-key">Source</span><span class="stat-val">ROM Hacking</span></div>
  </div>

  <div class="launch-btn">Press E to Launch Game</div>
</div>
</body>
</html>
